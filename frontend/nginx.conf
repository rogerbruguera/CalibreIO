server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|svg|png|gif|ico|woff2?|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }
}
